<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Какой ты шармикс — тест</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root{
        --purple:#824DBB;
        --purple-light:#9d5fd4;
        --teal:#4DBBA9;
        --dark:#161414;
        --c-service:#3498DB;
        --c-pro:#FF8C00;
        --c-partner:#9B59B6;
    }
    *{box-sizing:border-box;}
    body{
        margin:0;
        font-family:'Inter',Arial,sans-serif;
        background:#0d0c0f url('background.png') center center;
        background-size:cover;
        background-attachment:fixed;
        min-height:100vh;
        overflow-x:hidden;
        color:#fff;
    }
    #pixelRain{
        position:fixed;
        top:0;left:0;
        width:100vw;height:100vh;
        pointer-events:none;
        z-index:0;
    }
    #bgCharms{
        position:fixed;
        top:0;left:0;
        width:100vw;height:100vh;
        pointer-events:none;
        z-index:0;
    }
    #app{
        position:relative;
        z-index:2;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:30px 16px;
    }
    .screen{
        width:100%;
        display:flex;
        justify-content:center;
        animation:fadeIn .5s ease;
    }
    .screen.hidden{display:none;}
    @keyframes fadeIn{
        from{opacity:0; transform:translateY(12px);}
        to{opacity:1; transform:translateY(0);}
    }
    .card{
        background:var(--dark);
        border:1px solid var(--purple);
        box-shadow:0 0 35px rgba(130,77,187,.55);
        width:920px;
        max-width:100%;
        padding:50px 45px;
        text-align:center;
        position:relative;
    }

    /* ---------- START SCREEN ---------- */
    .kicker{
        display:inline-block;
        font-size:13px;
        letter-spacing:2px;
        text-transform:uppercase;
        color:var(--teal);
        border:1px solid var(--teal);
        padding:5px 14px;
        margin-bottom:22px;
    }
    #screenStart h1{
        font-size:56px;
        font-weight:800;
        margin:0 0 16px;
        line-height:1.15;
    }
    .subtitle{
        font-size:18px;
        color:#cfc9d6;
        max-width:520px;
        margin:0 auto 30px;
        line-height:1.5;
    }
    .charm-strip{
        display:flex;
        flex-wrap:nowrap;
        justify-content:center;
        align-items:center;
        gap:10px;
        max-width:100%;
        width:100%;
        margin:0 auto 34px;
    }
    .charm-strip img{
        width:46px;height:46px;
        max-width:9%;
        flex-shrink:1;
        image-rendering:pixelated;
        animation:charmBob 2.4s ease-in-out infinite;
        opacity:.9;
    }
    .charm-strip img:nth-child(2n){animation-delay:.3s;}
    .charm-strip img:nth-child(3n){animation-delay:.6s;}
    @keyframes charmBob{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-8px);}
    }
    .meta-note{
        font-size:13px;
        color:#8b8591;
        margin-top:22px;
    }

    /* ---------- BUTTONS ---------- */
    button{
        font-family:inherit;
        cursor:pointer;
        border:none;
        transition:all .2s;
    }
    .btn-primary{
        background:var(--purple);
        color:#fff;
        font-size:22px;
        font-weight:600;
        padding:15px 44px;
        border-radius:6px;
    }
    .btn-primary:hover{
        background:var(--purple-light);
        transform:translateY(-2px);
        box-shadow:0 6px 20px rgba(130,77,187,.5);
    }
    .btn-secondary{
        background:transparent;
        border:1px solid var(--purple);
        color:#fff;
        font-size:17px;
        font-weight:500;
        padding:13px 26px;
        border-radius:6px;
    }
    .btn-secondary:hover{
        background:rgba(130,77,187,.15);
    }
    .btn-text{
        background:none;
        color:#8b8591;
        font-size:14px;
        text-decoration:underline;
        margin-top:22px;
        padding:6px;
    }
    .btn-text:hover{color:#fff;}

    /* ---------- QUIZ SCREEN ---------- */
    #screenQuiz{flex-direction:column; align-items:center; padding-bottom:90px;}
    .quiz-topbar{
        width:920px;
        max-width:100%;
        margin-bottom:14px;
        display:flex;
        align-items:center;
        gap:14px;
    }
    .progress-track{
        flex:1;
        height:6px;
        background:#2a2530;
        border:1px solid var(--purple);
        overflow:hidden;
    }
    .progress-fill{
        height:100%;
        width:0%;
        background:linear-gradient(90deg,var(--purple),var(--teal));
        transition:width .4s ease;
    }
    .progress-label{
        font-size:14px;
        color:#cfc9d6;
        white-space:nowrap;
        font-variant-numeric:tabular-nums;
    }
    .quiz-card{
        text-align:left;
        padding:32px 40px 34px;
    }
    .question-image{
        width:100%;
        max-height:180px;
        display:flex;
        justify-content:center;
        margin-bottom:18px;
        border-radius:6px;
        overflow:hidden;
    }
    .question-image.hidden{display:none;}
    .question-image img{
        max-width:100%;
        max-height:180px;
        object-fit:contain;
        image-rendering:pixelated;
    }
    #questionText{
        font-size:clamp(17px, 2.4vw, 24px);
        font-weight:600;
        line-height:1.4;
        margin:0 0 22px;
        text-align:center;
        white-space:pre-line;
    }
    .quiz-card.has-image #questionText{
        font-size:clamp(16px, 2.1vw, 21px);
        margin-bottom:16px;
    }
    .quiz-card.has-image .answer-btn{
        padding:11px 16px;
        font-size:clamp(13px, 1.8vw, 15px);
    }
    .answers{
        display:flex;
        flex-direction:column;
        gap:10px;
    }
    .answers.answers-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }
    .answer-btn-img{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-align:center;
        gap:8px;
        padding:14px 10px !important;
    }
    .answer-btn-img img,
    .answer-img-placeholder{
        width:100%;
        max-width:130px;
        height:90px;
        object-fit:contain;
        image-rendering:pixelated;
    }
    .answer-img-placeholder{
        background:#12101600;
        border:1px dashed #3a3440;
        border-radius:4px;
    }
    .answer-btn-img span:last-child{
        font-size:14px;
        font-weight:400;
        line-height:1.35;
        text-align:center;
        width:100%;
    }
    .answer-btn{
        background:#1f1c24;
        border:1px solid #3a3440;
        color:#fff;
        font-size:16px;
        text-align:left;
        padding:15px 20px;
        border-radius:6px;
        line-height:1.4;
    }
    .answer-btn:hover:not(:disabled){
        border-color:var(--purple);
        background:rgba(130,77,187,.15);
        transform:translateX(4px);
    }
    .answer-btn:disabled{cursor:default;}
    .answer-btn.selected{
        border-color:var(--purple);
        background:rgba(130,77,187,.28);
        box-shadow:0 0 0 1px var(--purple);
    }
    .answer-btn-img.selected{transform:translateY(-2px);}

    .bottom-nav{
        position:fixed;
        left:0; right:0; bottom:0;
        z-index:40;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        padding:12px 20px;
        background:rgba(13,12,15,.94);
        backdrop-filter:blur(8px);
        border-top:1px solid rgba(130,77,187,.4);
    }
    .nav-btn{
        font-family:inherit;
        cursor:pointer;
        border:none;
        border-radius:6px;
        transition:all .2s;
        white-space:nowrap;
    }
    .nav-btn-back{
        background:transparent;
        border:1px solid #3a3440;
        color:#cfc9d6;
        font-size:14px;
        padding:11px 18px;
    }
    .nav-btn-back:hover{border-color:var(--purple); color:#fff;}
    .nav-btn-next{
        background:var(--purple);
        color:#fff;
        font-size:15px;
        font-weight:600;
        padding:11px 30px;
    }
    .nav-btn-next:hover:not(:disabled){background:var(--purple-light);}
    .nav-btn-next:disabled{opacity:.35; cursor:not-allowed;}
    .nav-btn-next.hidden{visibility:hidden;}

    .answer-btn.correct{
        border-color:var(--teal);
        background:rgba(77,187,169,.18);
        box-shadow:0 0 14px rgba(77,187,169,.4);
    }
    .answer-btn.wrong{
        border-color:#e05c5c;
        background:rgba(224,92,92,.12);
        opacity:.6;
    }

    /* ---------- DOORS (puzzle question) ---------- */
    .doors{
        display:flex;
        gap:16px;
        justify-content:center;
        margin-top:10px;
    }
    .doors.hidden{display:none;}
    .door{
        flex:1;
        max-width:220px;
        background:#1f1c24;
        border:2px solid #3a3440;
        padding:26px 14px;
        text-align:center;
        border-radius:6px 6px 2px 2px;
        transition:all .2s;
    }
    .door .door-label{
        font-size:13px;
        text-transform:uppercase;
        letter-spacing:1px;
        margin-bottom:10px;
        opacity:.7;
    }
    .door .door-text{
        font-size:15px;
        line-height:1.4;
    }
    .door:hover:not(.locked){
        transform:translateY(-4px);
        border-color:var(--purple);
        cursor:pointer;
    }
    .door.red{border-top:5px solid #c0392b;}
    .door.blue{border-top:5px solid #2980b9;}
    .door.green{border-top:5px solid #27ae60;}
    .door.correct{
        border-color:var(--teal);
        background:rgba(77,187,169,.18);
        box-shadow:0 0 20px rgba(77,187,169,.5);
    }
    .door.wrong{
        border-color:#e05c5c;
        opacity:.5;
    }
    .door.locked{pointer-events:none;}

    /* ---------- RESULT SCREEN ---------- */
    .result-card{
        padding:46px 44px 40px;
        overflow:hidden;
    }
    #resultBurst{
        position:absolute;
        top:0;left:0;
        width:100%;height:100%;
        pointer-events:none;
    }
    #resultShareArea{
        background:var(--dark);
        padding:10px 6px 28px;
    }
    .result-category{
        display:inline-block;
        font-size:13px;
        letter-spacing:1.5px;
        text-transform:uppercase;
        padding:6px 16px;
        border-radius:20px;
        margin-bottom:22px;
        font-weight:600;
    }
    .charm-halo{
        width:170px;height:170px;
        margin:0 auto 24px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
    }
    .charm-halo::before{
        content:'';
        position:absolute;
        inset:0;
        border-radius:50%;
        filter:blur(18px);
        opacity:.55;
        background:inherit;
    }
    .charm-halo img{
        width:120px;height:120px;
        image-rendering:pixelated;
        position:relative;
        z-index:1;
        animation:charmFloatBig 2.6s ease-in-out infinite;
    }
    @keyframes charmFloatBig{
        0%,100%{transform:translateY(0) scale(1);}
        50%{transform:translateY(-10px) scale(1.04);}
    }
    .charm-halo img.is-portrait{
        width:150px;height:150px;
        object-fit:contain;
        image-rendering:auto;
    }
    #resultTitle{
        font-size:32px;
        font-weight:800;
        line-height:1.25;
        margin:0 0 18px;
        max-width:680px;
        margin-left:auto;
        margin-right:auto;
    }
    .strengths-chip{
        display:inline-block;
        background:#1f1c24;
        border:1px solid var(--teal);
        color:var(--teal);
        font-size:14px;
        font-weight:600;
        padding:7px 16px;
        border-radius:20px;
        margin-bottom:20px;
    }
    #resultDesc{
        font-size:17px;
        line-height:1.65;
        color:#e4e0ea;
        max-width:620px;
        margin:0 auto 32px;
    }
    .result-actions{
        display:flex;
        gap:14px;
        justify-content:center;
        flex-wrap:wrap;
    }

    /* ---------- COLLECTION MODAL ---------- */
    .modal{
        position:fixed;
        inset:0;
        z-index:50;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:20px;
    }
    .modal.hidden{display:none;}
    .modal-backdrop{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.75);
    }
    .modal-content{
        position:relative;
        background:var(--dark);
        border:1px solid var(--purple);
        box-shadow:0 0 40px rgba(130,77,187,.5);
        max-width:820px;
        width:100%;
        max-height:85vh;
        overflow-y:auto;
        padding:36px;
        text-align:center;
    }
    .modal-content h2{
        font-size:26px;
        margin:0 0 26px;
    }
    .modal-close{
        position:absolute;
        top:16px;right:16px;
        background:transparent;
        color:#fff;
        font-size:20px;
        width:34px;height:34px;
        border:1px solid #3a3440;
        border-radius:50%;
    }
    .modal-close:hover{border-color:var(--purple);}
    .collection-grid{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:16px;
    }
    .collection-item{
        background:#1f1c24;
        border:1px solid #3a3440;
        border-radius:8px;
        padding:16px 10px;
        transition:all .2s;
    }
    .collection-item.mine{
        border-color:var(--teal);
        box-shadow:0 0 16px rgba(77,187,169,.4);
    }
    .collection-item img{
        width:54px;height:54px;
        image-rendering:pixelated;
        margin-bottom:8px;
    }
    .collection-item .ci-name{
        font-size:12px;
        line-height:1.35;
        color:#cfc9d6;
    }
    .collection-item.mine .ci-name{color:#fff; font-weight:600;}

    /* ---------- TOAST ---------- */
    .toast{
        position:fixed;
        bottom:26px;
        left:50%;
        transform:translateX(-50%) translateY(20px);
        background:var(--teal);
        color:#0d0c0f;
        font-weight:600;
        font-size:14px;
        padding:12px 22px;
        border-radius:8px;
        z-index:100;
        opacity:0;
        transition:all .3s;
        pointer-events:none;
    }
    .toast.show{
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }

    /* ---------- MOBILE ---------- */
    @media (max-width:768px){
        body{padding:0;}
        #app{padding:16px 10px;}
        .card{padding:24px 16px; box-shadow:0 0 20px rgba(130,77,187,.5);}
        .kicker{font-size:11px; padding:4px 10px; margin-bottom:14px;}
        #screenStart h1{font-size:28px;}
        .subtitle{font-size:14px; margin-bottom:20px;}
        .charm-strip{gap:5px; max-width:100%; margin-bottom:24px;}
        .charm-strip img{width:30px;height:30px; max-width:10%;}
        .btn-primary{font-size:17px; padding:13px 30px; width:100%;}
        .quiz-topbar{width:100%; margin-bottom:10px;}
        .progress-label{font-size:12px;}
        .quiz-card{padding:20px 16px 22px;}
        .question-image{max-height:120px; margin-bottom:12px;}
        .question-image img{max-height:120px;}
        #questionText{font-size:17px !important; margin-bottom:16px !important;}
        .answers{gap:8px;}
        .answers.answers-grid{grid-template-columns:1fr 1fr; gap:8px;}
        .answer-btn-img img, .answer-img-placeholder{height:64px;}
        .answer-btn-img span:last-child{font-size:12px;}
        .answer-btn{font-size:14px; padding:12px 14px;}
        .bottom-nav{padding:10px 14px; gap:8px;}
        .nav-btn-back{font-size:13px; padding:10px 14px;}
        .nav-btn-next{font-size:14px; padding:10px 20px; flex:1;}
        #screenQuiz{padding-bottom:80px;}
        .doors{flex-direction:column; gap:10px;}
        .door{max-width:100%; padding:16px 12px;}
        #resultTitle{font-size:21px;}
        .strengths-chip{font-size:12px; padding:6px 12px;}
        #resultDesc{font-size:14px;}
        .charm-halo{width:110px;height:110px; margin-bottom:18px;}
        .charm-halo img{width:76px;height:76px;}
        .result-card{padding:32px 18px 28px;}
        .result-actions{flex-direction:column; gap:10px;}
        .result-actions button{width:100%;}
        .collection-grid{grid-template-columns:repeat(3,1fr); gap:10px;}
        .modal-content{padding:24px 16px;}
    }

    @media (max-width:380px){
        #screenStart h1{font-size:24px;}
        .charm-strip img{width:28px;height:28px;}
        #questionText{font-size:15px !important;}
        .answer-btn{font-size:13px; padding:10px 12px;}
    }
</style>
</head>
<body>

<canvas id="pixelRain"></canvas>
<canvas id="bgCharms"></canvas>

<div id="app">

    <!-- START SCREEN -->
    <div id="screenStart" class="screen">
        <div class="card">
            <div class="kicker">УКС · Шармиксы</div>
            <h1>Какой ты шармикс?</h1>
            <p class="subtitle">Пройди тест и узнай, с кем из героев ты похож по вайбу</p>
            <div class="charm-strip" id="startCharmStrip"></div>
            <button class="btn-primary" id="btnStart">Стартуем</button>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="screenQuiz" class="screen hidden">
        <div class="quiz-topbar">
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-label"><span id="qIndex">1</span> / <span id="qTotal">7</span></div>
        </div>
        <div class="card quiz-card">
            <div id="questionImageWrap" class="question-image hidden"></div>
            <h2 id="questionText"></h2>
            <div id="answersWrap" class="answers"></div>
            <div id="doorsWrap" class="doors hidden"></div>
        </div>

        <div class="bottom-nav">
            <button id="btnBack" class="nav-btn nav-btn-back">← Назад</button>
            <button id="btnNext" class="nav-btn nav-btn-next" disabled>Далее</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="screenResult" class="screen hidden">
        <div class="card result-card">
            <canvas id="resultBurst"></canvas>
            <div id="resultShareArea">
                <div class="result-category" id="resultCategory"></div>
                <div class="charm-halo" id="charmHalo">
                    <img id="resultCharmImg" alt="Шармикс">
                </div>
                <h1 id="resultTitle"></h1>
                <div class="strengths-chip" id="resultStrengths"></div>
                <p id="resultDesc"></p>
            </div>
            <div class="result-actions">
                <button class="btn-secondary" id="btnCollection">Посмотреть всю коллекцию</button>
                <button class="btn-primary" id="btnShare">Поделиться результатом</button>
            </div>
            <br>
            <button class="btn-text" id="btnRestart">Пройти еще раз</button>
        </div>
    </div>

</div>

<!-- COLLECTION MODAL -->
<div id="collectionModal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
        <button class="modal-close" id="modalClose">✕</button>
        <h2>Вся коллекция шармиксов</h2>
        <div class="collection-grid" id="collectionGrid"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ============ DATA ============ */

const CATEGORIES = {
    service: { name: 'Сервисность', color: '#3498DB' },
    pro:     { name: 'Профессионализм и экспертиза', color: '#FF8C00' },
    partner: { name: 'Партнерство и культура', color: '#9B59B6' }
};

const CHARACTERS = {
    guru:       { title:'Преисполнившийся в сервисности Гуру заботы', category:'service', charm:'quiz_assets/charm/guru.png', portrait:null,
                  strengths:'внимательность и отзывчивость',
                  desc:'Ты умеешь замечать детали и объяснять так, чтобы второй раз спрашивать не пришлось.' },
    volshebnik: { title:'Читающий между строк эмпатичный волшебник', category:'service', charm:'quiz_assets/charm/volshebnik.png', portrait:null,
                  strengths:'эмпатия и отзывчивость',
                  desc:'Ты быстро понимаешь, когда человеку нужен не только ответ. Подбираешь правильный тон, задаtшь нужный вопрос и помогаешь пройти сложную ситуацию немного спокойнее..' },
    podderzhka: { title:'Молниеносная поддержка, нашедшая короткий путь', category:'service', charm:'quiz_assets/charm/podderzhka.png', portrait:null,
                  strengths:'экспертиза и решительность',
                  desc:'Ты быстро выделяешь главное от шума, находишь нужную информацию и находишь решение вопроса. Пока остальные уточняют, насколько все срочно, у тебя уже готовы рекомендации на будущее.' },

/* ============ STATE ============ */

let currentQ = 0;
let scores = {};
let answerHistory = []; // answerHistory[i] = { pts:[...], index:N } for question i, or undefined
let pendingAnswer = null; // {answer, index} selected but not yet confirmed via "Далее"
let nextAction = () => {}; // what clicking the bottom "Далее/Узнать" button currently does
Object.keys(CHARACTERS).forEach(k => scores[k] = 0);

const screenStart  = document.getElementById('screenStart');
const screenQuiz   = document.getElementById('screenQuiz');
const screenResult = document.getElementById('screenResult');

/* ============ INIT ============ */

function switchScreen(el){
    if (typeof hideToast === 'function') hideToast();
    [screenStart, screenQuiz, screenResult].forEach(s => s.classList.add('hidden'));
    el.classList.remove('hidden');
    el.classList.remove('screen');
    void el.offsetWidth;
    el.classList.add('screen');
}

// preview strip on start screen
(function initStartStrip(){
    const strip = document.getElementById('startCharmStrip');
    const sample = ['guru','volshebnik','podderzhka','nextlevel','genius','best','hero','vibe','transform'];
    sample.forEach(key => {
        const img = document.createElement('img');
        img.src = CHARACTERS[key].charm;
        strip.appendChild(img);
    });
})();

function resetQuizState(){
    currentQ = 0;
    answerHistory = [];
    pendingAnswer = null;
    Object.keys(scores).forEach(k => scores[k] = 0);
}

document.getElementById('btnStart').addEventListener('click', () => {
    resetQuizState();
    switchScreen(screenQuiz);
    renderQuestion();
});

document.getElementById('btnRestart').addEventListener('click', () => {
    resetQuizState();
    switchScreen(screenQuiz);
    renderQuestion();
});

document.getElementById('btnBack').addEventListener('click', () => {
    if (currentQ === 0){
        switchScreen(screenStart);
        return;
    }
    currentQ--;
    const prev = answerHistory[currentQ];
    if (prev){
        prev.pts.forEach(key => scores[key]--);
        answerHistory[currentQ] = undefined;
    }
    renderQuestion();
});

document.getElementById('btnNext').addEventListener('click', () => nextAction());

function defaultNextAction(){
    if (!pendingAnswer) return;
    const prev = answerHistory[currentQ];
    if (prev){
        prev.pts.forEach(key => scores[key]--);
    }
    pendingAnswer.answer.pts.forEach(key => scores[key]++);
    answerHistory[currentQ] = { pts: pendingAnswer.answer.pts, index: pendingAnswer.index };
    pendingAnswer = null;
    nextQuestion();
}

/* ============ QUIZ RENDER ============ */

function renderQuestion(){
    const q = QUESTIONS[currentQ];
    pendingAnswer = null;

    document.getElementById('qIndex').textContent = currentQ + 1;
    document.getElementById('qTotal').textContent = QUESTIONS.length;
    document.getElementById('progressFill').style.width = (currentQ / QUESTIONS.length * 100) + '%';

    const questionText = document.getElementById('questionText');
    questionText.textContent = q.text;

    const imgWrap = document.getElementById('questionImageWrap');
    const quizCard = document.querySelector('.quiz-card');
    if (q.image){
        imgWrap.innerHTML = `<img src="${q.image}" alt="">`;
        imgWrap.classList.remove('hidden');
        quizCard.classList.add('has-image');
    } else {
        imgWrap.innerHTML = '';
        imgWrap.classList.add('hidden');
        quizCard.classList.remove('has-image');
    }

    const answersWrap = document.getElementById('answersWrap');
    const doorsWrap = document.getElementById('doorsWrap');
    const btnNext = document.getElementById('btnNext');
    answersWrap.innerHTML = '';
    doorsWrap.innerHTML = '';

    if (q.puzzle){
        answersWrap.classList.add('hidden');
        doorsWrap.classList.remove('hidden');
        btnNext.textContent = 'Узнать свою шармиксность';
        btnNext.disabled = true;
        btnNext.classList.add('hidden');
        nextAction = () => {};

        q.doors.forEach((door, i) => {
            const d = document.createElement('div');
            d.className = 'door ' + door.color;
            d.innerHTML = `<div class="door-label">${door.label}</div><div class="door-text">${door.hint}</div>`;
            d.addEventListener('click', () => handleDoorClick(i, d, doorsWrap));
            doorsWrap.appendChild(d);
        });
    } else {
        answersWrap.classList.remove('hidden');
        doorsWrap.classList.add('hidden');
        btnNext.textContent = 'Далее';
        btnNext.classList.remove('hidden');
        btnNext.disabled = true;
        nextAction = defaultNextAction;
        answersWrap.classList.toggle('answers-grid', !!q.answerImages);

        const previouslyChosen = answerHistory[currentQ];

        q.answers.forEach((a, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn' + (q.answerImages ? ' answer-btn-img' : '');
            if (q.answerImages && a.img){
                btn.innerHTML = `<img src="${a.img}" alt=""><span>${a.text}</span>`;
            } else if (q.answerImages){
                btn.innerHTML = `<span class="answer-img-placeholder"></span><span>${a.text}</span>`;
            } else {
                btn.textContent = a.text;
            }
            btn.addEventListener('click', () => selectAnswer(a, i, btn, answersWrap));
            answersWrap.appendChild(btn);

            if (previouslyChosen && previouslyChosen.index === i){
                btn.classList.add('selected');
                pendingAnswer = { answer: a, index: i };
            }
        });

        btnNext.disabled = !pendingAnswer;
    }
}

function selectAnswer(answer, index, btn, wrap){
    wrap.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    pendingAnswer = { answer, index };
    document.getElementById('btnNext').disabled = false;
}

function handleDoorClick(index, doorEl, wrap){
    const q = QUESTIONS[currentQ];
    wrap.querySelectorAll('.door').forEach(d => d.classList.add('locked'));

    const doors = wrap.querySelectorAll('.door');
    doors[q.correctIndex].classList.add('correct');
    if (index !== q.correctIndex){
        doorEl.classList.add('wrong');
    }

    const chosen = q.answers[index];
    const prev = answerHistory[currentQ];
    if (prev){
        prev.pts.forEach(key => scores[key]--);
    }
    chosen.pts.forEach(key => scores[key]++);
    answerHistory[currentQ] = { pts: chosen.pts, index };

    const isLast = currentQ >= QUESTIONS.length - 1;

    setTimeout(() => {
        if (isLast){
            const btnNext = document.getElementById('btnNext');
            btnNext.classList.remove('hidden');
            btnNext.disabled = false;
            nextAction = showResult;
        } else {
            nextQuestion();
        }
    }, 1000);
}

function nextQuestion(){
    currentQ++;
    if (currentQ >= QUESTIONS.length){
        showResult();
    } else {
        renderQuestion();
    }
}

/* ============ RESULT ============ */

function computeWinner(){
    let winnerKey = null;
    let max = -1;
    Object.keys(scores).forEach(key => {
        if (scores[key] > max){
            max = scores[key];
            winnerKey = key;
        }
    });
    return winnerKey;
}

function showResult(){
    document.getElementById('progressFill').style.width = '100%';
    const key = computeWinner();
    const char = CHARACTERS[key];
    const cat = CATEGORIES[char.category];

    const catEl = document.getElementById('resultCategory');
    if (char.special){
        catEl.textContent = 'Это очень необычно';
        catEl.style.background = 'linear-gradient(90deg, var(--teal), var(--purple-light))';
        catEl.style.color = '#0d0c0f';
        catEl.style.border = 'none';
    } else {
        catEl.textContent = cat.name;
        catEl.style.background = cat.color + '33';
        catEl.style.color = cat.color;
        catEl.style.border = '1px solid ' + cat.color;
    }

    document.getElementById('charmHalo').style.background = cat.color;
    const resultImg = document.getElementById('resultCharmImg');
    resultImg.src = char.portrait || char.charm;
    resultImg.classList.toggle('is-portrait', !!char.portrait);
    document.getElementById('resultTitle').textContent = char.title;
    document.getElementById('resultStrengths').textContent = 'Сильные качества: ' + char.strengths;
    document.getElementById('resultDesc').textContent = char.desc;

    switchScreen(screenResult);
    burstParticles(cat.color);

    document.getElementById('btnShare').onclick = () => downloadResultImage(char, cat);
    document.getElementById('btnCollection').onclick = () => {
        window.open('https://wiki.skbkontur.ru/pages/viewpage.action?pageId=1043631326', '_blank');
    };
}

/* ---- Native canvas card renderer (no external libraries) ---- */

function roundRectPath(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

function drawPill(ctx, text, cx, y, opts){
    ctx.font = opts.font;
    const paddingX = 22, h = opts.height || 40;
    const w = ctx.measureText(text).width + paddingX * 2;
    const x = cx - w / 2;
    roundRectPath(ctx, x, y, w, h, h / 2);
    if (opts.bg){ ctx.fillStyle = opts.bg; ctx.fill(); }
    if (opts.border){ ctx.lineWidth = 1.5; ctx.strokeStyle = opts.border; ctx.stroke(); }
    ctx.fillStyle = opts.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, cx, y + h / 2 + 1);
    ctx.textBaseline = 'alphabetic';
    return y + h;
}

function wrapCenteredText(ctx, text, cx, startY, maxWidth, lineHeight){
    const words = text.split(' ');
    const lines = [];
    let line = '';
    words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line){
            lines.push(line);
            line = word;
        } else {
            line = test;
        }
    });
    if (line) lines.push(line);

    ctx.textAlign = 'center';
    let y = startY;
    lines.forEach(l => {
        ctx.fillText(l, cx, y);
        y += lineHeight;
    });
    return y;
}

function loadImageSafe(src){
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
    });
}

async function downloadResultImage(char, cat){
    const btnShare = document.getElementById('btnShare');
    btnShare.disabled = true;
    const originalLabel = btnShare.textContent;
    btnShare.textContent = 'Готовим картинку…';

    try {
        if (document.fonts && document.fonts.ready){
            await document.fonts.ready;
        }

        const W = 900, H = 1180;
        const canvas = document.createElement('canvas');
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');

        // Outer background
        ctx.fillStyle = '#0d0c0f';
        ctx.fillRect(0, 0, W, H);

        // Card
        roundRectPath(ctx, 24, 24, W - 48, H - 48, 26);
        ctx.fillStyle = '#161414';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#824DBB';
        ctx.stroke();

        const cx = W / 2;
        let y = 100;

        // Kicker
        ctx.font = '600 15px Inter, Arial, sans-serif';
        ctx.fillStyle = '#4DBBA9';
        ctx.textAlign = 'center';
        ctx.fillText('УКС · ШАРМИКСЫ', cx, y);
        y += 50;

        // Category pill (or special phrase)
        if (char.special){
            y = drawPill(ctx, 'Это очень необычно', cx, y, {
                font: '700 16px Inter, Arial, sans-serif',
                bg: '#4DBBA9',
                color: '#0d0c0f',
                height: 42
            });
        } else {
            y = drawPill(ctx, cat.name, cx, y, {
                font: '600 15px Inter, Arial, sans-serif',
                bg: cat.color + '33',
                border: cat.color,
                color: cat.color,
                height: 42
            });
        }
        y += 50;

        // Charm halo glow + icon
        const haloCenterY = y + 130;
        const glow = ctx.createRadialGradient(cx, haloCenterY, 20, cx, haloCenterY, 160);
        glow.addColorStop(0, cat.color + '99');
        glow.addColorStop(1, cat.color + '00');
        ctx.fillStyle = glow;
        ctx.fillRect(cx - 170, haloCenterY - 170, 340, 340);

        const icon = await loadImageSafe(char.portrait || char.charm);
        if (icon){
            const size = 210;
            ctx.imageSmoothingEnabled = true;
            ctx.drawImage(icon, cx - size / 2, haloCenterY - size / 2, size, size);
        }
        y = haloCenterY + 150 + 40;

        // Title
        ctx.font = '800 42px Inter, Arial, sans-serif';
        ctx.fillStyle = '#ffffff';
        y = wrapCenteredText(ctx, char.title, cx, y, 720, 52);
        y += 18;

        // Strengths pill
        y = drawPill(ctx, 'Сильные качества: ' + char.strengths, cx, y, {
            font: '600 16px Inter, Arial, sans-serif',
            bg: '#1f1c24',
            border: '#4DBBA9',
            color: '#4DBBA9',
            height: 42
        });
        y += 46;

        // Description
        ctx.font = '400 22px Inter, Arial, sans-serif';
        ctx.fillStyle = '#e4e0ea';
        wrapCenteredText(ctx, char.desc, cx, y, 700, 33);

        // Footer
        ctx.font = '400 15px Inter, Arial, sans-serif';
        ctx.fillStyle = '#8b8591';
        ctx.textAlign = 'center';
        ctx.fillText('пройди тест «Какой ты шармикс» и узнай свой архетип', cx, H - 44);

        const link = document.createElement('a');
        const safeName = char.title.split(',')[0].split('—')[0].trim()
            .toLowerCase()
            .replace(/[^a-zа-я0-9]+/gi, '_')
            .slice(0, 40);
        link.download = `moy-sharmix-${safeName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('Картинка скачана!');
    } catch (err){
        console.error('downloadResultImage error:', err);
        showToast('Не удалось создать картинку');
    } finally {
        btnShare.disabled = false;
        btnShare.textContent = originalLabel;
    }
}

let toastTimeoutId = null;

function showToast(msg){
    const t = document.getElementById('toast');
    clearTimeout(toastTimeoutId);
    t.textContent = msg;
    t.classList.add('show');
    toastTimeoutId = setTimeout(() => t.classList.remove('show'), 2200);
}

function hideToast(){
    clearTimeout(toastTimeoutId);
    document.getElementById('toast').classList.remove('show');
}

/* ============ PARTICLE BURST ============ */

function burstParticles(color){
    const canvas = document.getElementById('resultBurst');
    const card = canvas.closest('.card');
    canvas.width = card.offsetWidth;
    canvas.height = card.offsetHeight;
    const ctx = canvas.getContext('2d');

    const cx = canvas.width / 2;
    const cy = 220;
    const particles = [];
    for (let i = 0; i < 26; i++){
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 3 + Math.random() * 4,
            life: 1,
            color: Math.random() > 0.5 ? color : '#ffffff'
        });
    }

    let frame = 0;
    function tick(){
        frame++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.life <= 0) return;
            alive = true;
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life -= 0.018;
            ctx.globalAlpha = Math.max(p.life, 0);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1;
        if (alive && frame < 140) requestAnimationFrame(tick);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    tick();
}

/* ============ FALLING PIXEL RAIN ============ */

(function initPixelRain(){
    const canvas = document.getElementById('pixelRain');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#824DBB', '#4DBBA9', '#3498DB', '#FF8C00', '#9B59B6'];
    const isMobile = window.innerWidth < 768;
    const count = isMobile ? 35 : 70;

    const bucketWidth = 10;
    let buckets = Math.ceil(canvas.width / bucketWidth);
    let floorHeights = new Array(buckets).fill(0);
    const maxFloorPerBucket = isMobile ? 26 : 42;
    const maxLanded = isMobile ? 70 : 150;
    const landed = [];

    const drops = [];
    for (let i = 0; i < count; i++){
        drops.push(makeDrop(true));
    }

    function makeDrop(randomY){
        const chunky = Math.random() < 0.18;
        return {
            x: Math.random() * canvas.width,
            y: randomY ? Math.random() * canvas.height : -10,
            size: chunky ? (5 + Math.random() * 3) : (2 + Math.random() * 3),
            speed: 0.12 + Math.random() * 0.35,
            color: colors[Math.floor(Math.random() * colors.length)],
            alpha: 0.12 + Math.random() * 0.3,
            flicker: Math.random() * Math.PI * 2
        };
    }

    function landPixel(d){
        const bucket = Math.max(0, Math.min(buckets - 1, Math.floor(d.x / bucketWidth)));
        if (floorHeights[bucket] < maxFloorPerBucket){
            const jitterX = (bucket * bucketWidth) + Math.random() * bucketWidth;
            const py = canvas.height - floorHeights[bucket] - d.size;
            landed.push({ x: jitterX, y: py, size: d.size, color: d.color, alpha: d.alpha * 0.8, bucket });
            floorHeights[bucket] += d.size * 0.5;
            if (landed.length > maxLanded){
                const removed = landed.shift();
                floorHeights[removed.bucket] = Math.max(0, floorHeights[removed.bucket] - removed.size * 0.5);
            }
        }
        d.y = -10;
        d.x = Math.random() * canvas.width;
    }

    function loop(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw landed (settled) pixels
        landed.forEach(p => {
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
        });

        // Draw + update falling pixels
        drops.forEach(d => {
            d.y += d.speed;
            d.flicker += 0.02;

            const bucket = Math.max(0, Math.min(buckets - 1, Math.floor(d.x / bucketWidth)));
            const landingY = canvas.height - floorHeights[bucket] - d.size;

            if (d.y >= landingY){
                landPixel(d);
            } else {
                const a = d.alpha * (0.6 + 0.4 * Math.sin(d.flicker));
                ctx.globalAlpha = a;
                ctx.fillStyle = d.color;
                ctx.fillRect(Math.round(d.x), Math.round(d.y), d.size, d.size);
            }
        });

        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }
    loop();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        buckets = Math.ceil(canvas.width / bucketWidth);
        floorHeights = new Array(buckets).fill(0);
        landed.length = 0;
    });
})();

/* ============ AMBIENT FLOATING CHARMS ============ */

(function initBgCharms(){
    const canvas = document.getElementById('bgCharms');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const bgKeys = ['guru','volshebnik','podderzhka','nextlevel','genius','best','hero','vibe','transform'];
    const allCharms = bgKeys.map(k => CHARACTERS[k].charm);
    const imgs = allCharms.map(src => { const i = new Image(); i.src = src; return i; });

    const particles = imgs.map((img) => ({
        img,
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.12,
        vy: (Math.random() - 0.5) * 0.12,
        size: 60 + Math.random() * 40,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.005
    }));

    function loop(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.07;
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
            if (p.x < -50) p.x = canvas.width + 50;
            if (p.x > canvas.width + 50) p.x = -50;
            if (p.y < -50) p.y = canvas.height + 50;
            if (p.y > canvas.height + 50) p.y = -50;
            if (p.img.complete){
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(p.img, -p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }
    loop();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
})();
